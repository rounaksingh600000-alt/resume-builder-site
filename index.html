<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Resume Builder</title>
<!-- jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #fff;
    margin-bottom: 20px;
    font-size: 2.5em;
  }
  form {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 1em;
  }
  button {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    font-size: 1.2em;
    background-color: #ff4b2b;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
  }
  button:hover {
    background-color: #ff416c;
  }
  /* CV Preview Style */
  #cvPreview {
    display: none;
    margin-top: 30px;
  }
  #cvPreview iframe {
    width: 100%;
    height: 600px;
    border: none;
    border-radius: 10px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<h1>AI Resume Builder</h1>

<form id="cvForm">
  <label>Name:</label>
  <input type="text" id="name" placeholder="Your Full Name" required />

  <label>Email:</label>
  <input type="email" id="email" placeholder="you@example.com" required />

  <label>Phone:</label>
  <input type="text" id="phone" placeholder="+91 12345 67890" required />

  <label>About Me:</label>
  <textarea id="about" rows="4" placeholder="Brief about yourself" required></textarea>

  <label>Education:</label>
  <textarea id="education" rows="3" placeholder="e.g., B.Tech in Computer Science" required></textarea>

  <label>Experience:</label>
  <textarea id="experience" rows="3" placeholder="Your work experience" required></textarea>

  <label>Skills:</label>
  <textarea id="skills" rows="3" placeholder="List your skills" required></textarea>

  <button type="button" onclick="generateCV()">Generate CV</button>
</form>

<!-- CV Preview Section -->
<div id="cvPreview">
  <h2 style="text-align:center; margin-top:30px;">Your CV Preview</h2>
  <iframe id="cvFrame"></iframe>
</div>

<script>
  async function generateCV() {
    const { jsPDF } = window.jspdf;

    // Get form data
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const about = document.getElementById('about').value;
    const education = document.getElementById('education').value;
    const experience = document.getElementById('experience').value;
    const skills = document.getElementById('skills').value;

    // Create CV HTML for preview
    const cvHTML = `
      <div style="font-family:Arial, sans-serif; padding:20px;">
        <h1 style="text-align:center;">${name}</h1>
        <p style="text-align:center;">Email: ${email} | Phone: ${phone}</p>
        <hr/>
        <h2>About Me</h2>
        <p>${about}</p>
        <h2>Education</h2>
        <p>${education}</p>
        <h2>Experience</h2>
        <p>${experience}</p>
        <h2>Skills</h2>
        <p>${skills}</p>
      </div>
    `;

    // Show preview
    const iframe = document.getElementById('cvFrame');
    iframe.srcdoc = cvHTML;
    document.getElementById('cvPreview').style.display = 'block';

    // Generate PDF
    const pdf = new jsPDF();

    // Use html method to convert HTML to PDF
    await pdf.html(iframe, {
      callback: () => {
        // Open PDF in new tab
        window.open(pdf.output('bloburl'), '_blank');
      },
      x: 10,
      y: 10,
      width: 180,
      windowWidth: 650
    });
  }
</script>

</body>
</html>
